name: "Validate Source"

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.head_ref }}

      - uses: DeterminateSystems/determinate-nix-action@v3.21.0
        with:
          extra-conf: |
            extra-substituters = https://cache.nixos.org/ https://nix-community.cachix.org https://flux-rs.cachix.org/ https://cache.flakehub.com/

      - uses: ./.github/actions/cache-flake-formatter
        env:
          CACHIX_AUTH_TOKEN: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: "Nix Formatter: Run"
        run:  nix formatter run -- --ci

      - name: "Check Flake Outputs"
        run:  nix flake check --accept-flake-config

